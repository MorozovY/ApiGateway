# ApiGateway Development Environment
# Health checks configured for Kubernetes compatibility (Story 1.7)
#
# Usage:
#   docker-compose up -d    # Запуск всех сервисов
#
# Централизованная инфраструктура (Story 13.8, 13.9, 13.10, 13.11):
#   - PostgreSQL: infra проект (postgres-net)
#   - Redis: infra проект (redis-net)
#   - Keycloak: infra проект
#   - Prometheus & Grafana: infra проект (monitoring-net) — Story 13.11
#
# Мониторинг:
#   - Prometheus: https://prometheus.ymorozov.ru (в infra)
#   - Grafana: https://grafana.ymorozov.ru (в infra)
#   - Dashboard "API Gateway" с метриками gateway-core

# Все сервисы определены в docker-compose.override.yml
# PostgreSQL удалён — используется централизованный infra-postgres (Story 13.9)
# Redis удалён — используется централизованный infra-redis (Story 13.10)
# Keycloak удалён — используется централизованный из infra (Story 13.8)
# Prometheus и Grafana удалены — используется централизованный мониторинг из infra (Story 13.11)

networks:
  gateway-network:
    driver: bridge
  # Внешняя сеть для подключения к централизованному Traefik
  # Создаётся в infra проекте: docker network create traefik-net
  traefik-net:
    external: true
  # Внешняя сеть для подключения к централизованному PostgreSQL (Story 13.9)
  # Создаётся в infra проекте: docker network create postgres-net
  postgres-net:
    external: true
  # Внешняя сеть для подключения к централизованному Redis (Story 13.10)
  # Создаётся в infra проекте: docker network create redis-net
  redis-net:
    external: true
  # Внешняя сеть для подключения к централизованному мониторингу (Story 13.11)
  # Создаётся в infra проекте: docker network create monitoring-net
  monitoring-net:
    external: true
  # Внешняя сеть для подключения к Jaeger distributed tracing (Story 14.5)
  # Создаётся: docker network create tracing-net
  tracing-net:
    external: true
